name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26 (Swift 6.2)
        run: sudo xcode-select -s /Applications/Xcode_26.5.app
      - name: Swift build
        run: swift build -c release
      - name: Validator smoke test
        run: |
          python3 -m venv tools/.venv
          tools/.venv/bin/pip install -q ezdxf
          tools/.venv/bin/python tools/validate.py examples/floorplan.dxf || true
